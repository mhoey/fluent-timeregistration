<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        Timeregistration (V2)
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;800&display=swap" rel="stylesheet">
    <script type="module" src="./main.js"></script>
    <style>
        body {
            background-color: rgb(255, 255, 255);
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
        }

        .inputsection {
            display: flex;
            flex-direction: column;
        }

        #ds,
        #ae {
            width: 200px;
            border: solid 2px rgb(188, 186, 196);
            border-radius: 4px;
            padding: 16px;
        }

        #ae {
            margin-top: 8px
        }

        #alta {
            border-collapse: collapse;
        }

        #alta th {
            width: 20%;
            color: gray;
            background-color: lightgray
        }

        #alta td,
        #alta th {
            padding: 8px;
            border: solid 1px lightgray
        }

        #th,
        #ts,
        #tm {
            color: rgb(53, 46, 80);
        }

        #th {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: bolder;
            font-size: 100px;
            letter-spacing: -0.1em;
        }

        #tm,
        #ts {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: bolder;
            font-size: 50px;
            letter-spacing: -0.1em;
        }

        #ths {
            margin-top: 16px;
            background-color: rgb(188, 186, 196);
            text-align: center;
            border-radius: 16px;
        }

        .daycard {
            border: 1px solid lightgray;
            margin-bottom: 20px;
        }

        .weekday {
            font-size: 24px;
            font-weight: bold;
        }

        .weektotalduration {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <section id="ds" class="inputsection">
        <fluent-dropdown id="ewd" slot="input" type="select" title="Weekday">
            <fluent-listbox id="elb">
                <fluent-option value="1">Monday</fluent-option>
                <fluent-option value="2">Tuesday</fluent-option>
                <fluent-option value="3">Wednesday</fluent-option>
                <fluent-option value="4">Thursday</fluent-option>
                <fluent-option value="5">Friday</fluent-option>
                <fluent-option value="6">Saturday</fluent-option>
                <fluent-option value="7">Sunday</fluent-option>
            </fluent-listbox>
        </fluent-dropdown>
        <fluent-text-input id="emt" data-format="hhmm" placeholder="00:00">Start time</fluent-text-input>
        <fluent-text-input id="elt" data-format="hhmm" placeholder="00:00">End time</fluent-text-input>
        <section style="padding:8px">
            <fluent-checkbox id="exlt" checked="true"></fluent-checkbox><span style="padding-left:4px">Exclude
                lunch</span>
        </section>
        <section>
            <fluent-button id="aact" appearance="primary">Add activity</fluent-button>
        </section>
        <section id="ths">
            <div>
                <span id="th">0</span>
                <span id="ts">.</span>
                <span id="tm">00</span>
            </div>
        </section>
        <section id="tdh"></section>
        <section id="tdat"></section>
    </section>

    <section id="weekday-sections">
        <!-- Weekday sections will be dynamically generated here -->
    </section>

    <template id="weekday-template">
        <section class="daycard">
            <h2 class="weekday"></h2>
            <table class="activitytable">
                <thead>
                    <tr>
                        <th>Start</th>
                        <th>End</th>
                        <th>Duration</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </template>

    <template id="weektotal-template">
        <h2 class="weektotal">Weekly Total</h2>
        <table class="weektotaltable">
            <thead>
                <tr>
                    <td>Day</td>
                    <th>Start</th>
                    <th>End</th>
                    <th>Hours</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td></td>
                    <td></td>
                    <td class="weektotalduration"></td>
                </tr>
            </tfoot>
        </table>
    </template>
</body>

</html>
